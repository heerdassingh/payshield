server:
  port: 8080

spring:
  application:
    name: payshield-api

  # Kafka Configuration
  kafka:
    bootstrap-servers: localhost:9093
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3

  # MySQL Configuration (for user/merchant data access)
  datasource:
    url: jdbc:mysql://localhost:3307/payshield?useSSL=false&allowPublicKeyRetrieval=true
    username: payshield
    password: payshield_secret
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # MongoDB for reading transaction status
  data:
    mongodb:
      uri: mongodb://localhost:27017/payshield

  # Redis for rate limiting
  redis:
    host: localhost
    port: 6379

# PayShield Configuration
payshield:
  kafka:
    topics:
      incoming: incoming-transactions
      validated: validated-transactions
      processed: processed-transactions
      fraud-alerts: fraud-alerts
      user-not-found: user-not-found

  ai:
    service-url: http://localhost:8000

  rate-limiting:
    enabled: true
    requests-per-minute: 100

# Actuator & Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}

# Logging
logging:
  level:
    com.payshield: DEBUG
    org.springframework.kafka: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
